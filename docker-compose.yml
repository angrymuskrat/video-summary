services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_summary
      POSTGRES_USER: video_summary
      POSTGRES_PASSWORD: video_summary
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      VIDEO_SUMMARY_DATABASE_URL: postgresql+psycopg://video_summary:video_summary@db:5432/video_summary
      VIDEO_SUMMARY_STORAGE_ROOT: /app/data
      VIDEO_SUMMARY_ARTIFACT_RETENTION_HOURS: ${VIDEO_SUMMARY_ARTIFACT_RETENTION_HOURS:-168}
      VIDEO_SUMMARY_CLEANUP_INTERVAL_SECONDS: ${VIDEO_SUMMARY_CLEANUP_INTERVAL_SECONDS:-1800}
      VIDEO_SUMMARY_FRONTEND_ORIGIN: http://localhost:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-nano}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_TIMEOUT_SEC: ${OPENAI_TIMEOUT_SEC:-60}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - app-data:/app/data
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:
  app-data:
